<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header>
        <h1>Panel de Administrador</h1>
        <p>Ingrese sus credenciales para acceder al sistema</p>
    </header>

    <main>
        <div class="login-container">
            <div class="login-card" style="text-align: center;">
                <h2 style="color: var(--primario);">Acceso Administrador</h2>
                <p style="margin-bottom: 20px;">Ingrese sus credenciales de seguridad</p>

                <div id="loginError" class="alerta" style="display:none; margin-bottom: 15px;"></div>

                <form id="loginAdminForm">
                    <div class="campo" style="text-align: left; margin-bottom: 15px;">
                        <label for="adminUser" class="requerido">Usuario</label>
                        <input type="text" id="adminUser" data-required="true" placeholder="">
                    </div>
                    <div class="campo" style="text-align: left; margin-bottom: 20px;">
                        <label for="adminPass" class="requerido">Contraseña</label>
                        <input type="password" id="adminPass" data-required="true" placeholder="">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <button type="submit" class="btn btn-primario" style="width: 100%;">Iniciar Sesión</button>
                        <a href="index.html" class="btn btn-secundario"
                            style="text-decoration: none; display: block;">Volver al Inicio</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>Formato Único Hoja de Vida &copy; 2026 - Desarrollo Web - Parcial II</p>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
