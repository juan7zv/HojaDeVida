<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja de Vida - Formato Único</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <h1>FORMATO ÚNICO - HOJA DE VIDA</h1>
        <p>Persona Natural · Leyes 190 de 1995, 489 y 443 de 1998</p>
    </header>

    <main>
        <div class="login-container">
            <div class="login-card">
                <h2>Iniciar Sesión</h2>
                <p>Ingrese sus credenciales para acceder al sistema</p>

                <div id="alertaGeneral" class="alerta"></div>

                <div class="campo">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" placeholder="Ingrese su usuario">
                    <span class="mensaje-error"></span>
                </div>

                <div class="campo">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" placeholder="Ingrese su contraseña">
                    <span class="mensaje-error"></span>
                </div>

                <div class="campo" id="contenedorRol">
                    <label>Rol</label>
                    <div class="grupo-radio">
                        <label><input type="radio" name="rol" value="usuario"> Usuario</label>
                        <label><input type="radio" name="rol" value="admin"> Administrador</label>
                    </div>
                    <span class="mensaje-error"></span>
                </div>

                <button class="btn btn-primario" onclick="iniciarSesion()">Ingresar</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Formato Único Hoja de Vida &copy; 2026 - Desarrollo Web - Parcial II</p>
    </footer>

    <script src="js/datos.js"></script>
    <script src="js/validacion.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
