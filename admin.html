<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Hoja de Vida</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header>
        <h1>PANEL DE ADMINISTRACIÓN</h1>
        <p>Gestión de Hojas de Vida</p>
    </header>

    <nav>
        <a href="index.html" class="btn-logout">Cerrar Sesión</a>
        <a href="#" id="tab-admin" class="paso-activo" onclick="switchTab('admin')">Administración</a>
        <a href="#" id="tab-historial" onclick="switchTab('historial')">Historial</a>
    </nav>

    <main>
        <div id="alertaGeneral" class="alerta"></div>

        <div id="vista-admin">
            <section>
                <h2><span class="numero-seccion">⚙</span> Hojas de Vida Pendientes</h2>


            <!-- Tabla de hojas de vida -->
            <div style="overflow-x: auto; width: 100%; margin-top: 15px;">
                <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>Documento</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaHVBody">
                    <!-- Registros dinámicos cargados con JS -->
                </tbody>
            </table>
            </div>
        </section>
        </div>

        <div id="vista-historial" style="display: none;">
            <section>
                <h2><span class="numero-seccion">📋</span> Historial de Estados</h2>
                <div style="background:#fff; padding: 10px; border-radius: 6px; border: 1px solid #ddd; max-height: 450px; overflow-y: auto; margin-top:15px;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Candidato</th>
                                <th>Estado Final</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="tablaHistorialBody">
                            <!-- JS inyectará el historial resumido aquí -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>Panel de Administración &copy; 2026 - Con JavaScript (Seguridad Mock)</p>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
