<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - Hoja de Vida</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <h1>PANEL DE ADMINISTRACIÓN</h1>
        <p>Gestión de Hojas de Vida</p>
    </header>

    <nav>
        <a href="index.html">Cerrar Sesión</a>
        <span class="paso-activo">Administración</span>
    </nav>

    <main>
        <div id="alertaGeneral" class="alerta"></div>

        <section>
            <h2><span class="numero-seccion">⚙</span> Hojas de Vida Registradas</h2>

            <!-- Filtros -->
            <div class="filtros-admin">
                <label for="filtroEstado">Filtrar por estado:</label>
                <select id="filtroEstado" onchange="cargarTablaAdmin()">
                    <option value="todas">Todas</option>
                    <option value="diligenciada">Diligenciada</option>
                    <option value="aceptada">Aceptada</option>
                    <option value="rechazada">Rechazada</option>
                </select>
            </div>

            <!-- Tabla de hojas de vida -->
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>Documento</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaHVBody">
                    <!-- Se llena dinámicamente -->
                </tbody>
            </table>

            <!-- Detalle de HV -->
            <div id="detalleHV" class="detalle-hv">
                <!-- Se llena al hacer click en Ver Detalle -->
            </div>
        </section>
    </main>

    <footer>
        <p>Panel de Administración &copy; 2026 - Desarrollo Web</p>
    </footer>

    <script src="js/datos.js"></script>
    <script src="js/validacion.js"></script>
    <script src="js/app.js"></script>
    <script src="js/app2.js"></script>
    <script src="js/admin.js"></script>
    <script>
        window.onload = function() {
            cargarTablaAdmin();
        };
    </script>
</body>
</html>
